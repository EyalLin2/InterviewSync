<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewSync — כניסה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <style>
    body {
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1f36 0%, #2d3561 50%, #1a1f36 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      padding: 2.5rem 2rem;
      width: 100%; max-width: 400px;
    }
    .brand { font-size: 1.8rem; font-weight: 800; color: #635bff; }
    .brand-sub { color: #6c757d; font-size: 0.88rem; margin-bottom: 2rem; }
    .btn-login { background: #635bff; border-color: #635bff; font-weight: 600; }
    .btn-login:hover { background: #4f46e5; border-color: #4f46e5; }
    .demo-box {
      background: #f8f7ff; border: 1px solid #d4d0ff;
      border-radius: 10px; padding: 0.75rem 1rem;
      font-size: 0.8rem; color: #4f46e5; margin-top: 1.5rem;
    }
    .form-control:focus { border-color: #635bff; box-shadow: 0 0 0 0.2rem rgba(99,91,255,.15); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand">&#127891; InterviewSync</div>
      <div class="brand-sub">מערכת ניהול תלמידים ומנטורינג</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">שם משתמש</label>
        <input type="text" name="username" class="form-control form-control-lg"
               placeholder="הכנס/י שם משתמש" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">סיסמה</label>
        <input type="password" name="password" class="form-control form-control-lg"
               placeholder="הכנס/י סיסמה" required>
      </div>
      <button type="submit" class="btn btn-login btn-lg w-100 text-white">כניסה למערכת</button>
    </form>

    <div class="demo-box">
      <strong>חשבונות לדוגמה:</strong><br>
      מנהל — <code>admin</code> / <code>admin123</code><br>
      תלמיד — <code>student1</code> / <code>student123</code>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
