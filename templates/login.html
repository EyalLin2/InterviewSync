<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewSync — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .brand-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0d6efd;
      letter-spacing: -0.5px;
    }
    .brand-sub {
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }
    .demo-badge {
      background: #f0f7ff;
      border: 1px solid #bdd7ff;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.8rem;
      color: #3a6ea5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-title">&#127891; InterviewSync</div>
      <div class="brand-sub">AI-Powered Interview Preparation</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username</label>
        <input type="text" id="username" name="username" class="form-control form-control-lg"
               placeholder="Enter your username" required autofocus />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input type="password" id="password" name="password" class="form-control form-control-lg"
               placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
    </form>

    <div class="demo-badge mt-4">
      <strong>Demo accounts:</strong><br />
      Mentor &mdash; <code>admin</code> / <code>admin123</code><br />
      Student &mdash; <code>student1</code> / <code>student123</code>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
