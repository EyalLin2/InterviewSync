replicaCount: 2

image:
  # Replace with your AWS ECR URI
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/interviewsync-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

# AWS ECR pull secret — create with:
# kubectl create secret docker-registry ecr-registry-secret \
#   --docker-server=<ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com \
#   --docker-username=AWS \
#   --docker-password=$(aws ecr get-login-password)
imagePullSecrets:
  - name: ecr-registry-secret

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: interviewsync.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: interviewsync-tls
      hosts:
        - interviewsync.example.com

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  BACKEND_URL: "http://interviewsync-backend:8000"
  SECRET_KEY: "change-in-production"
