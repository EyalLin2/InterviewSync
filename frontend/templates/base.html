<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}InterviewSync{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      /* Brand */
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-subtle: #eff4ff;

      /* Neutrals */
      --color-text: #1f2430;
      --color-text-muted: #6b7280;
      --color-bg: #ffffff;
      --color-bg-subtle: #f7f8fa;
      --color-border: #e5e7eb;

      /* Status (muted) */
      --color-success: #2f8f5b;
      --color-success-subtle: #eaf6f0;
      --color-warning: #b8860b;
      --color-warning-subtle: #fbf4e3;
      --color-danger: #c0392b;
      --color-danger-subtle: #fbeae8;
      --color-info: #2563eb;
      --color-info-subtle: #eff4ff;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;

      /* Radius */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      /* Shadow */
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
      --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);

      /* Navbar — per-role, deliberately coordinated */
      --color-navbar-student: var(--color-primary);
      --color-navbar-admin: #1e293b;
      --color-navbar-business: #0f3d3a;
      --color-navbar-hub: #1e293b;
      --color-navbar-text: #ffffff;
      --color-navbar-text-muted: rgba(255,255,255,.65);

      /* Accent / section tint */
      --color-accent-bg: #eef2ff;
      --color-accent-border: #c7d2fe;
    }

    body {
      font-family: 'Heebo', sans-serif;
      color: var(--color-text);
      background: var(--color-bg-subtle);
    }

    a { color: var(--color-primary); }

    .icon {
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
      stroke-width: 2;
    }

    /* Shared card primitive */
    .card-surface {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    /* Shared buttons */
    .btn-primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
      border-radius: var(--radius-md);
    }
    .btn-primary:hover, .btn-primary:focus {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }
    .btn-outline-primary {
      color: var(--color-primary);
      border-color: var(--color-primary);
      border-radius: var(--radius-md);
    }
    .btn, .btn-sm {
      border-radius: var(--radius-md);
    }

    /* Shared badges/pills */
    .badge-soft {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--color-bg-subtle);
      color: var(--color-text-muted);
    }
    .badge-soft-success { background: var(--color-success-subtle); color: var(--color-success); }
    .badge-soft-warning { background: var(--color-warning-subtle); color: var(--color-warning); }
    .badge-soft-danger  { background: var(--color-danger-subtle);  color: var(--color-danger); }
    .badge-soft-info    { background: var(--color-info-subtle);    color: var(--color-info); }

    /* Bolder solid badges, for dashboard emphasis */
    .badge-solid { color: #fff; font-weight: 600; }
    .badge-solid-success { background: var(--color-success); }
    .badge-solid-warning { background: var(--color-warning); }
    .badge-solid-danger  { background: var(--color-danger); }
    .badge-solid-info    { background: var(--color-info); }
    .badge-solid-primary { background: var(--color-primary); }

    /* Left-edge accent border (RTL-safe via logical property) */
    .card-accent-left { border-inline-start: 3px solid var(--color-text-muted); }
    .card-accent-left.accent-primary { border-inline-start-color: var(--color-primary); }
    .card-accent-left.accent-success { border-inline-start-color: var(--color-success); }
    .card-accent-left.accent-warning { border-inline-start-color: var(--color-warning); }
    .card-accent-left.accent-danger  { border-inline-start-color: var(--color-danger); }
    .card-accent-left.accent-info    { border-inline-start-color: var(--color-info); }

    /* Tinted section panel */
    .section-panel {
      background: var(--color-accent-bg);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }

    /* Navbar role colors */
    .navbar-student  { background: var(--color-navbar-student); }
    .navbar-admin    { background: var(--color-navbar-admin); }
    .navbar-business { background: var(--color-navbar-business); }
    .navbar-hub      { background: var(--color-navbar-hub); }
    .navbar-brand-text {
      font-weight: 800;
      color: var(--color-navbar-text);
      font-size: 1.15rem;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Avatar */
    .avatar-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--color-primary-subtle);
      color: var(--color-primary);
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* Progress bar */
    .progress {
      background: var(--color-bg-subtle);
      border-radius: var(--radius-sm);
      height: 8px;
    }
    .progress-bar {
      background: var(--color-primary);
    }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">

  {% block navbar %}{% endblock %}

  {% block flash_container %}
  <div class="container-fluid px-4 pt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
  </div>
  {% endblock %}

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_script %}{% endblock %}
  <script>
    if (window.lucide) { lucide.createIcons(); }
  </script>
</body>
</html>
