<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewSync — דף לא נמצא</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <style>
    :root {
      --color-primary: #2563eb;
      --color-text: #1f2430;
      --color-text-muted: #6b7280;
      --color-bg: #ffffff;
      --color-bg-subtle: #f7f8fa;
      --color-danger: #c0392b;
      --space-2: 8px;
      --space-3: 12px;
      --space-5: 24px;
      --space-6: 32px;
      --radius-lg: 14px;
      --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);
    }
    body { font-family: 'Heebo', sans-serif; background: var(--color-bg-subtle); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-card { background: var(--color-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: var(--space-6) var(--space-5); text-align: center; max-width: 420px; width: 100%; }
    .error-code { font-size: 5rem; font-weight: 800; color: var(--color-primary); line-height: 1; }
    .error-title { font-size: 1.3rem; font-weight: 700; color: var(--color-text); margin: var(--space-3) 0 var(--space-2); }
    .error-sub { color: var(--color-text-muted); font-size: .9rem; margin-bottom: var(--space-6); }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">הדף לא נמצא</div>
    <div class="error-sub">הקישור שחיפשת לא קיים או הוסר.</div>
    {% if user and user.role == 'admin' %}
      <a href="{{ url_for('admin_hub') }}" class="btn btn-primary px-4">חזרה ללוח הבית</a>
    {% else %}
      <a href="{{ url_for('index') }}" class="btn btn-primary px-4">חזרה לדף הראשי</a>
    {% endif %}
  </div>
</body>
</html>
