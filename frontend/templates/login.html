<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewSync — כניסה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-subtle: #eff4ff;
      --color-text: #1f2430;
      --color-text-muted: #6b7280;
      --color-bg: #ffffff;
      --color-bg-subtle: #f7f8fa;
      --color-border: #e5e7eb;
      --space-2: 8px;
      --space-5: 24px;
      --space-6: 32px;
      --radius-lg: 14px;
      --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);
    }
    body {
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      background: var(--color-bg-subtle);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: var(--space-6) var(--space-5);
      width: 100%; max-width: 400px;
    }
    .brand {
      font-size: 1.8rem; font-weight: 800; color: var(--color-primary);
      display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    }
    .brand-sub { color: var(--color-text-muted); font-size: 0.88rem; margin-bottom: var(--space-6); }
    .btn-login { background: var(--color-primary); border-color: var(--color-primary); font-weight: 600; }
    .btn-login:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
.form-control:focus { border-color: var(--color-primary); box-shadow: 0 0 0 0.2rem var(--color-primary-subtle); }
    .icon { width: 1em; height: 1em; vertical-align: -0.125em; stroke-width: 2; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand"><i data-lucide="graduation-cap" class="icon"></i> InterviewSync</div>
      <div class="brand-sub">מערכת ניהול תלמידים ומנטורינג</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">שם משתמש</label>
        <input type="text" name="username" class="form-control form-control-lg"
               placeholder="הכנס/י שם משתמש" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">סיסמה</label>
        <input type="password" name="password" class="form-control form-control-lg"
               placeholder="הכנס/י סיסמה" required>
      </div>
      <button type="submit" class="btn btn-login btn-lg w-100 text-white">כניסה למערכת</button>
    </form>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
