<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewSync — שגיאת שרת</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <style>
    body { font-family: 'Heebo', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-card { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(67,97,238,.1); padding: 3rem 2.5rem; text-align: center; max-width: 420px; width: 100%; }
    .error-code { font-size: 5rem; font-weight: 800; color: #ef4444; line-height: 1; }
    .error-title { font-size: 1.3rem; font-weight: 700; color: #1a1f36; margin: .75rem 0 .5rem; }
    .error-sub { color: #6b7280; font-size: .9rem; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <div class="error-title">שגיאת שרת</div>
    <div class="error-sub">משהו השתבש. אנא נסה/י שוב בעוד מספר שניות.</div>
    {% if user and user.role == 'admin' %}
      <a href="{{ url_for('admin_hub') }}" class="btn btn-primary px-4">חזרה ללוח הבית</a>
    {% else %}
      <a href="{{ url_for('index') }}" class="btn btn-primary px-4">חזרה לדף הראשי</a>
    {% endif %}
  </div>
</body>
</html>
