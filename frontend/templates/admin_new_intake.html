<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewSync — סטודנט חדש</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-subtle: #eff4ff;
      --color-text: #1f2430;
      --color-text-muted: #6b7280;
      --color-bg: #ffffff;
      --color-bg-subtle: #f7f8fa;
      --color-border: #e5e7eb;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
      --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);
    }
    body { font-family:'Heebo',sans-serif; background:var(--color-bg-subtle); color: var(--color-text); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .icon { width: 1em; height: 1em; vertical-align: -0.125em; stroke-width: 2; }
    .card { border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:var(--space-6); max-width:420px; width:100%; background:var(--color-bg); border: 1px solid var(--color-border); }
    .btn-crm { background:var(--color-primary); border-color:var(--color-primary); color:#fff; font-weight:600; border-radius: var(--radius-md); }
    .btn-crm:hover { background:var(--color-primary-hover); border-color:var(--color-primary-hover); color:#fff; }
  </style>
</head>
<body>
<div class="card">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <h5 class="fw-bold mb-1"><i data-lucide="clipboard-list" class="icon"></i> סטודנט חדש + שאלון קליטה</h5>
  <p class="text-muted small mb-4">צור חשבון → מלא שאלון קליטה מלא</p>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold small">שם משתמש <span class="text-danger">*</span></label>
      <input type="text" name="username" class="form-control" placeholder="israel123" required autofocus>
      <div class="form-text">הסטודנט ישתמש בזה להתחברות</div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">סיסמה זמנית</label>
      <input type="text" name="password" class="form-control" placeholder="change123" value="change123">
      <div class="form-text">שלח/י לסטודנט — יוכל/תוכל לשנות מאוחר</div>
    </div>
    <button type="submit" class="btn btn-crm w-100 btn-lg fw-bold">המשך לשאלון קליטה &#8592;</button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('admin_dashboard') }}" class="text-muted small">ביטול</a>
  </div>
</div>
<script>
  if (window.lucide) { lucide.createIcons(); }
</script>
</body>
</html>
