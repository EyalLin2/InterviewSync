name: Deploy

# ──────────────────────────────────────────────────────────────
# This workflow handles deployment to staging and production.
# It is DORMANT until AWS/K8s infrastructure is ready.
#
# To activate:
#   1. Add secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#      ECR_REGISTRY (optional: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN,
#      SLACK_WEBHOOK_URL)
#   2. Set repository variable DEPLOY_ENABLED = true
#      (Settings → Secrets and variables → Variables)
#
# Staging:  triggered on push to main  → :latest tag on ECR
# Prod:     triggered on git tag v*.*.*  → :<version> + :stable on ECR
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  AWS_REGION:     eu-west-1
  ECR_REGISTRY:   ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE:  interviewsync-backend
  FRONTEND_IMAGE: interviewsync-frontend

jobs:
  # ── Staging deploy (main push only) ─────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    # Gated by repository variable — flip to 'true' when AWS is ready
    if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push backend → ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → ECR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger ArgoCD staging sync
        env:
          ARGOCD_SERVER:     ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ -n "$ARGOCD_SERVER" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/interviewsync-backend-staging/sync" || true
            curl -sf -X POST \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/interviewsync-frontend-staging/sync" || true
          fi

      - name: Notify Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ *InterviewSync* deployed to *staging* — \`${{ github.sha }}\` by ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

  # ── Production deploy (version tag only) ────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push backend → ECR (production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → ECR (production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger ArgoCD production sync
        env:
          ARGOCD_SERVER:     ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ -n "$ARGOCD_SERVER" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/interviewsync-backend-prod/sync" || true
            curl -sf -X POST \
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/interviewsync-frontend-prod/sync" || true
          fi

      - name: Notify Slack — success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 *InterviewSync ${{ steps.version.outputs.tag }}* deployed to *production* by ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Notify Slack — failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ *InterviewSync* deploy failed on \`${{ github.ref }}\` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi
