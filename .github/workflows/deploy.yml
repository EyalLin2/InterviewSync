name: Deploy

# ──────────────────────────────────────────────────────────────
# CI/CD deployment pipeline (Docker Hub registry)
#
# Staging:    push to main        → :latest + :sha tags
# Production: git tag  v*.*.*     → :v1.0.0 + :stable tags
#
# Required secrets (GitHub Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
#
# Optional secrets (skip step if not set):
#   SLACK_WEBHOOK_URL   — for build notifications
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE:  interviewsync-backend
  FRONTEND_IMAGE: interviewsync-frontend

jobs:
  # ── Staging deploy (main push only) ─────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend → staging
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → staging
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack — staging
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ *InterviewSync* deployed to *staging* — \`${{ github.sha }}\` by ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

  # ── Production deploy (version tag only) ────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend → production
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → production
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack — production success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 *InterviewSync ${{ steps.version.outputs.tag }}* deployed to *production* by ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Notify Slack — production failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ *InterviewSync* deploy failed on \`${{ steps.version.outputs.tag }}\` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi
