name: Deploy

# ──────────────────────────────────────────────────────────────
# CI/CD deployment pipeline (Amazon ECR registry)
#
# Staging:    CI passes on main     → :latest + :sha tags
# Production: git tag  v*.*.*       → :v1.0.0 + :stable tags
#
# Staging deploy only fires AFTER the CI workflow succeeds —
# this prevents pushing a broken image when tests fail.
#
# Required secrets (GitHub Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      — IAM user with ECR push + EKS read access
#   AWS_SECRET_ACCESS_KEY  — IAM secret key
#   AWS_REGION             — e.g. us-east-1
#   AWS_ACCOUNT_ID         — 12-digit AWS account number
#   GITOPS_TOKEN           — GitHub PAT (repo scope) for interviewsync-gitops repo
#
# Optional secrets (skip step if not set):
#   SLACK_WEBHOOK_URL      — for build notifications
# ──────────────────────────────────────────────────────────────

on:
  # Staging: only runs after CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Production: triggered by a version tag directly
  push:
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE:  interviewsync-backend
  FRONTEND_IMAGE: interviewsync-frontend

jobs:
  # ── Staging deploy (only when CI passed on main) ─────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend → ECR staging
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → ECR staging
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps repo → trigger ArgoCD staging sync
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository_owner }}/interviewsync-gitops.git /tmp/gitops
          cd /tmp/gitops
          sed -i "s/tag: .*/tag: \"${SHA}\"/" apps/staging/backend-values.yaml
          sed -i "s/tag: .*/tag: \"${SHA}\"/" apps/staging/frontend-values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || git commit -m "ci: staging → ${SHA}"
          git push

      - name: Notify Slack — staging deployed
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ *InterviewSync* deployed to *staging* — \`${{ github.event.workflow_run.head_sha }}\` by ${{ github.event.workflow_run.triggering_actor.login }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

  # ── Production deploy (version tag only) ────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend → ECR production
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend → ECR production
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps repo → trigger ArgoCD production sync
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository_owner }}/interviewsync-gitops.git /tmp/gitops
          cd /tmp/gitops
          sed -i "s/tag: .*/tag: \"${TAG}\"/" apps/production/backend-values.yaml
          sed -i "s/tag: .*/tag: \"${TAG}\"/" apps/production/frontend-values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || git commit -m "ci: production → ${TAG}"
          git push

      - name: Notify Slack — production success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 *InterviewSync ${{ steps.version.outputs.tag }}* deployed to *production* by ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Notify Slack — production failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ *InterviewSync* deploy failed on \`${{ steps.version.outputs.tag }}\` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi
