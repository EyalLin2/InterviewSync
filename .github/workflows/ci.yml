name: CI/CD Pipeline

on:
  push:
    branches:
      - "feature/**"
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

env:
  AWS_REGION:      ${{ vars.AWS_REGION || 'eu-west-1' }}
  ECR_REGISTRY:    ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE:   interviewsync-backend
  FRONTEND_IMAGE:  interviewsync-frontend

# ──────────────────────────────────────────────
# JOB 1 — Lint + Test (runs on every push)
# ──────────────────────────────────────────────
jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       interviewsync_test
          POSTGRES_USER:     interviewsync
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: pip install -r frontend/requirements.txt

      - name: Lint — backend (flake8)
        run: flake8 backend/ --config=setup.cfg

      - name: Lint — frontend (flake8)
        run: flake8 frontend/ --config=setup.cfg

      - name: Test — backend
        env:
          DATABASE_URL: postgresql://interviewsync:testpassword@localhost:5432/interviewsync_test
          SECRET_KEY: ci-test-secret-key
        run: pytest backend/tests/ -v --tb=short

      - name: Test — frontend
        env:
          SECRET_KEY:   ci-test-secret-key
          BACKEND_URL:  http://mock-backend:8000
        run: pytest frontend/tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # JOB 2 — Build Docker images (feature branch: no push)
  # ──────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 3 — Push to ECR + deploy to STAGING (master only)
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend → ECR (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push frontend → ECR (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trigger ArgoCD staging sync
        if: ${{ secrets.ARGOCD_SERVER != '' }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/interviewsync-backend-staging/sync" || true
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/interviewsync-frontend-staging/sync" || true

      - name: Notify Slack — staging deployed
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *InterviewSync* deployed to *staging* — commit `${{ github.sha }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────
  # JOB 4 — Push versioned tag + deploy to PRODUCTION
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend → ECR (production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push frontend → ECR (production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trigger ArgoCD production sync
        if: ${{ secrets.ARGOCD_SERVER != '' }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/interviewsync-backend-prod/sync" || true
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/interviewsync-frontend-prod/sync" || true

      - name: Notify Slack — production deployed
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 *InterviewSync ${{ steps.version.outputs.tag }}* deployed to *production* by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — build failure
        if: failure() && ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *InterviewSync* CI failed on `${{ github.ref }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
