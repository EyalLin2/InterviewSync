name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

# ──────────────────────────────────────────────────────────────
# This workflow runs on every push and PR — no secrets required.
# Stages: Lint → Test → Docker Build
# ──────────────────────────────────────────────────────────────

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting deps
        run: |
          pip install flake8

      - name: Lint backend
        run: flake8 backend/ --config=setup.cfg

      - name: Lint frontend
        run: flake8 frontend/ --config=setup.cfg

  # ── Stage 2: Test ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       interviewsync_test
          POSTGRES_USER:     interviewsync
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r frontend/requirements.txt

      - name: Test backend
        env:
          DATABASE_URL: postgresql://interviewsync:testpassword@localhost:5432/interviewsync_test
          SECRET_KEY:   ci-test-secret-key-long-enough-for-hs256
          TESTING:      "true"
        run: pytest backend/tests/ -v --tb=short

      - name: Test frontend
        env:
          SECRET_KEY:  ci-test-secret-key-long-enough-for-hs256
          BACKEND_URL: http://mock-backend:8000
        run: pytest frontend/tests/ -v --tb=short

  # ── Stage 3: Docker Build (validates Dockerfiles, no push) ───
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: interviewsync-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: interviewsync-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
